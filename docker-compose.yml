services:
  postgres:
    image: postgres:16
    container_name: ai-log-analyzer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops123
      POSTGRES_DB: log_analyzer
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d log_analyzer"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
